<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create an account — TechVault">
    <title>Register — TechVault</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <!-- ─── Navigation ─── -->
    <nav class="navbar">
        <div class="container">
            <a href="/" class="navbar-brand">
                <svg viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="2">
                    <defs>
                        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#6c63ff" />
                            <stop offset="100%" stop-color="#06b6d4" />
                        </linearGradient>
                    </defs>
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
                </svg>
                TechVault
            </a>
            <ul class="navbar-links">
                <li><a href="/">Shop</a></li>
            </ul>
            <div class="navbar-auth"></div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card fade-in-up">
            <h1>Create account</h1>
            <p class="subtitle">Join TechVault and start shopping today</p>

            <form id="register-form" autocomplete="on">
                <div class="form-group">
                    <label class="form-label" for="register-name">Full Name</label>
                    <input type="text" id="register-name" class="form-input" placeholder="John Doe" required
                        autocomplete="name">
                </div>
                <div class="form-group">
                    <label class="form-label" for="register-email">Email Address</label>
                    <input type="email" id="register-email" class="form-input" placeholder="you@example.com" required
                        autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label" for="register-password">Password</label>
                    <input type="password" id="register-password" class="form-input" placeholder="At least 6 characters"
                        required minlength="6" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label class="form-label" for="register-confirm">Confirm Password</label>
                    <input type="password" id="register-confirm" class="form-input" placeholder="••••••••" required
                        autocomplete="new-password">
                </div>
                <p class="form-error" id="register-error"></p>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">Create Account</button>
            </form>

            <div class="auth-divider">
                Already have an account? <a href="/login.html">Sign in</a>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
</body>

</html>
