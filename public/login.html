<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to TechVault">
    <title>Login — TechVault</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <!-- ─── Navigation ─── -->
    <nav class="navbar">
        <div class="container">
            <a href="/" class="navbar-brand">
                <svg viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="2">
                    <defs>
                        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#6c63ff" />
                            <stop offset="100%" stop-color="#06b6d4" />
                        </linearGradient>
                    </defs>
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
                </svg>
                TechVault
            </a>
            <ul class="navbar-links">
                <li><a href="/">Shop</a></li>
            </ul>
            <div class="navbar-auth"></div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card fade-in-up">
            <h1>Welcome back</h1>
            <p class="subtitle">Sign in to your account to continue shopping</p>

            <form id="login-form" autocomplete="on">
                <div class="form-group">
                    <label class="form-label" for="login-email">Email Address</label>
                    <input type="email" id="login-email" class="form-input" placeholder="you@example.com" required
                        autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label" for="login-password">Password</label>
                    <input type="password" id="login-password" class="form-input" placeholder="••••••••" required
                        autocomplete="current-password">
                </div>
                <p class="form-error" id="login-error"></p>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">Sign In</button>
            </form>

            <div class="auth-divider">
                Don't have an account? <a href="/register.html">Create one</a>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
</body>

</html>
