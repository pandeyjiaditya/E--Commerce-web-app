<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Order Confirmed — TechVault">
    <title>Order Confirmed — TechVault</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <!-- ─── Navigation ─── -->
    <nav class="navbar">
        <div class="container">
            <a href="/" class="navbar-brand">
                <svg viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="2">
                    <defs>
                        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#6c63ff" />
                            <stop offset="100%" stop-color="#06b6d4" />
                        </linearGradient>
                    </defs>
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
                </svg>
                TechVault
            </a>
            <ul class="navbar-links">
                <li><a href="/">Shop</a></li>
            </ul>
            <div class="navbar-auth"></div>
        </div>
    </nav>

    <div class="success-container">
        <div class="success-card" id="success-content">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M20 6L9 17l-5-5" />
                </svg>
            </div>
            <h1>Order Confirmed! 🎉</h1>
            <p class="subtitle">Thank you for your purchase. Your order has been placed successfully.</p>

            <div class="order-details-card" id="order-details">
                <div class="skeleton" style="height:20px; margin-bottom:0.5rem;"></div>
                <div class="skeleton" style="height:20px; margin-bottom:0.5rem;"></div>
                <div class="skeleton" style="height:20px;"></div>
            </div>

            <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                <a href="/" class="btn btn-primary btn-lg">Continue Shopping</a>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const orderData = localStorage.getItem('lastOrder');
            const detailsEl = document.getElementById('order-details');

            if (orderData) {
                const order = JSON.parse(orderData);
                detailsEl.innerHTML = `
          <div class="detail-row">
            <span class="label">Order ID</span>
            <span style="font-weight: 600;">#${order.id}</span>
          </div>
          <div class="detail-row">
            <span class="label">Payment ID</span>
            <span style="font-family: monospace; font-size: 0.8rem;">${order.payment_id}</span>
          </div>
          <div class="detail-row">
            <span class="label">Status</span>
            <span style="color: var(--accent-success); font-weight: 600;">${order.payment_status || 'Completed'}</span>
          </div>
          <hr style="border:none; border-top:1px solid var(--border-color); margin: 0.75rem 0;">
          ${order.items ? order.items.map(item => `
            <div class="detail-row">
              <span>${item.name} × ${item.quantity}</span>
              <span>$${(item.price * item.quantity).toFixed(2)}</span>
            </div>
          `).join('') : ''}
          <hr style="border:none; border-top:1px solid var(--border-color); margin: 0.75rem 0;">
          <div class="detail-row" style="font-weight: 700; font-size: 1.1rem;">
            <span>Total</span>
            <span style="background: var(--accent-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">$${order.total.toFixed(2)}</span>
          </div>
        `;

                // Clean up
                localStorage.removeItem('lastOrder');
            } else {
                detailsEl.innerHTML = `
          <p style="text-align:center; color: var(--text-muted);">No recent order found.</p>
        `;
            }
        });
    </script>
</body>

</html>
